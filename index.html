<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Nexus Arena</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&display=swap');
:root{
  --bg:#05070a;--card:#11151f;--soft:#1e2533;
  --prim:#3b82f6;--sec:#a855f7;--good:#10b981;
  --bad:#ef4444;--warn:#f59e0b;--txt:#f3f4f6;--bord:#2d3748;--en:#06b6d4;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);height:100vh;height:100dvh;overflow:hidden;position:fixed;width:100%;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:520px;margin:0 auto;border:1px solid var(--bord);background:var(--bg);}

/* ── HEADER ── */
header{flex-shrink:0;padding:5px 8px;border-bottom:1px solid var(--bord);background:#000;display:flex;align-items:center;gap:5px;}
.res-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;flex:1;}
.res-item{background:var(--card);padding:3px 2px;border-radius:4px;border:1px solid var(--bord);font-size:0.55rem;font-weight:900;text-align:center;}
.hdr-btn{background:none;border:1px solid #333;border-radius:5px;font-size:0.72rem;cursor:pointer;padding:3px 6px;color:#888;flex-shrink:0;}
.hdr-btn:hover{border-color:#555;color:#fff;}

/* ── MAIN SCROLLABLE — always scrolls independently ── */
.main-view{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 8px 220px;}

/* ── UNIT CARDS ── */
.unit-card{background:var(--card);border-radius:10px;padding:9px;margin-bottom:6px;border:1px solid var(--bord);border-left:5px solid transparent;transition:box-shadow 0.25s;}
.unit-card.stunned{border-color:var(--sec)!important;box-shadow:0 0 12px var(--sec);}
.unit-card.enraged{border-color:var(--bad)!important;box-shadow:0 0 10px var(--bad);animation:pulse-r 1s infinite;}
.unit-card.shielded{border-color:var(--prim)!important;box-shadow:0 0 10px var(--prim);}
.unit-card.buffed{border-color:var(--good)!important;box-shadow:0 0 8px var(--good);}
.unit-card.debuffed{border-color:#7c3aed!important;box-shadow:0 0 8px #7c3aed;}
.unit-card.evading{border-color:var(--en)!important;box-shadow:0 0 10px var(--en);}
@keyframes pulse-r{0%,100%{box-shadow:0 0 10px var(--bad);}50%{box-shadow:0 0 24px var(--bad);}}

/* HP BAR */
.hp-box{height:22px;background:#1a0505;border-radius:5px;margin:4px 0 2px;overflow:hidden;border:1px solid #3a1010;position:relative;}
.hp-fill{height:100%;transition:width 0.3s ease-out;min-width:3px;}
.hp-txt{position:absolute;width:100%;text-align:center;font-size:0.68rem;font-weight:900;line-height:22px;color:#fff;text-shadow:0 0 4px #000,1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000;z-index:5;}

/* ENERGY BAR */
.en-box{height:6px;background:#071a1f;border-radius:3px;margin-bottom:3px;overflow:hidden;border:1px solid #0a2a30;position:relative;}
.en-fill{height:100%;background:var(--en);transition:width 0.1s linear;}
.en-regen-lbl{position:absolute; right:2px; top: -1px; font-size: 0.4rem; color: #fff; font-family: monospace; text-shadow: 0 0 2px #000;}

/* STATUS PIPS */
.status-row{display:flex;gap:3px;min-height:14px;flex-wrap:wrap;margin-top:2px;}
.pip{font-size:0.50rem;background:#000;border-radius:3px;padding:1px 4px;border:1px solid;font-weight:800;}
.pip-buff{color:#10b981;border-color:#10b981;}.pip-debuff{color:#a855f7;border-color:#a855f7;}
.pip-stun{color:var(--sec);border-color:var(--sec);}.pip-block{color:var(--prim);border-color:var(--prim);}
.pip-immune{color:#555;border-color:#333;}.pip-enrage{color:var(--bad);border-color:var(--bad);}
.pip-evade{color:var(--en);border-color:var(--en);}

/* INTENT */
.intent-box{margin-top:4px;padding:5px 8px;border-radius:6px;border:1px solid #2a2a2a;background:#0a0a14;}
.intent-box.danger{border-color:var(--bad);background:#1a0808;animation:pulse-i 0.5s infinite;}
.intent-box.magic{border-color:var(--sec);background:#100a1a;}
@keyframes pulse-i{0%,100%{opacity:1;}50%{opacity:0.7;}}
.intent-row{font-size:0.63rem;font-weight:900;display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.intent-bar-bg{height:4px;background:#111;border-radius:2px;overflow:hidden;}
.intent-bar-fill{height:100%;border-radius:2px;}

/* DPS LIVE */
.dps-live{background:#080b10;border:1px solid #1a1a2a;border-radius:7px;padding:5px 8px;margin-bottom:6px;display:none;}
.dps-live.on{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.dps-col{display:flex;flex-direction:column;align-items:center;min-width:48px;}
.dps-lbl{font-size:0.46rem;color:#444;text-transform:uppercase;font-family:monospace;}
.dps-val{font-size:0.82rem;font-weight:900;font-family:monospace;}
.dps-div{width:1px;height:26px;background:#1a1a2a;}

/* DPS RECAP */
.dps-recap{background:#0a0d13;border:1px solid var(--bord);border-radius:10px;padding:10px;margin-bottom:6px;display:none;}
.dps-recap.on{display:block;}
.recap-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.recap-title{font-size:0.68rem;font-weight:900;color:var(--warn);font-family:Cinzel;}
.recap-dismiss{background:none;border:1px solid #333;border-radius:4px;color:#555;font-size:0.52rem;cursor:pointer;padding:2px 6px;}
.recap-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px;}
.recap-num{background:#000;border-radius:6px;padding:6px;text-align:center;}
.recap-num-lbl{font-size:0.44rem;color:#444;text-transform:uppercase;}
.recap-num-val{font-size:0.88rem;font-weight:900;}
.src-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.src-name{font-size:0.54rem;color:#888;width:80px;flex-shrink:0;}
.src-track{flex:1;height:8px;background:#111;border-radius:4px;overflow:hidden;}
.src-fill{height:100%;border-radius:4px;}
.src-pct{font-size:0.50rem;color:#555;width:26px;text-align:right;font-family:monospace;}

/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:7px;}
.tab-btn{flex:1;min-width:0;padding:6px 2px;background:var(--soft);border:1px solid var(--bord);border-radius:6px;color:#718096;font-weight:900;font-size:0.55rem;cursor:pointer;white-space:nowrap;}
.tab-btn.active{background:var(--prim);color:#fff;border-color:var(--prim);}

/* GEAR GRID */
.eq-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px;}
.slot{background:var(--card);aspect-ratio:1/1;border:1px dashed #3a3a3a;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:transform 0.1s;overflow:hidden;}
.slot:active{transform:scale(0.93);}
.slot-name{font-size:0.40rem;font-weight:900;text-align:center;line-height:1.25;padding:0 2px;margin-bottom:1px;}
.slot-stats{font-size:0.36rem;font-weight:800;color:var(--good);text-align:center;line-height:1.3;padding:0 2px;}
.slot-type{font-size:0.36rem;opacity:0.35;position:absolute;top:2px;left:3px;}
.slot-lvl{position:absolute;top:2px;right:2px;font-size:0.35rem;color:var(--warn);font-weight:900;}

/* ITEMS */
.item-card{background:var(--soft);border-radius:7px;padding:8px;margin-bottom:5px;border:1px solid var(--bord);cursor:pointer;transition:opacity 0.2s;}
.item-card:hover{opacity:0.85;}
.stat-tag{background:#000;padding:2px 4px;border-radius:4px;font-size:0.60rem;font-weight:800;margin-right:2px;margin-bottom:2px;display:inline-block;}
.delta-pos{color:var(--good);font-size:0.58rem;font-weight:900;}
.delta-neg{color:var(--bad);font-size:0.58rem;font-weight:900;}
.delta-neu{color:#555;font-size:0.58rem;}
.compare-row{display:flex;gap:3px;align-items:center;margin-top:3px;padding-top:3px;border-top:1px solid #1a1a1a;flex-wrap:wrap;}

/* LOG */
.log-msg{padding:2px 0;border-bottom:1px solid #0d0d0d;font-size:0.60rem;font-family:monospace;line-height:1.3;}
.log-msg.win{color:var(--good);}.log-msg.lose{color:var(--bad);}.log-msg.crit{color:var(--warn);font-weight:900;}
.log-msg.info{color:#3d4a5c;}.log-msg.buff{color:#67e8f9;}.log-msg.interrupt{color:#ef4444;font-weight:900;}

/* ── FIXED CONTROLS ── */
.controls{
  position:fixed;
  bottom:0;left:0;right:0;
  max-width:520px;
  margin:0 auto;
  background:var(--card);
  border-top:1px solid var(--bord);
  z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.duel-hud{background:#000;padding:5px 12px;border-top:2px solid var(--bord);}
.hud-row{display:flex;justify-content:space-between;font-size:0.64rem;font-weight:900;font-family:monospace;height:14px;margin-bottom:1px;}

/* GCD BAR */
.gcd-area{padding:5px 8px 3px;background:#050810;display:none;}
.gcd-area.on{display:block;}
.gcd-track{height:5px;background:#0e1428;border-radius:3px;overflow:hidden;margin-bottom:2px;}
.gcd-fill{height:100%;background:var(--prim);width:0%;border-radius:3px;}

/* SWING TIMER */
.swing-wrap{padding:3px 8px 5px;background:#050810;display:none;}
.swing-wrap.on{display:block;}
.swing-label{display:flex;justify-content:space-between;align-items:center;font-size:0.46rem;font-family:monospace;color:#555;margin-bottom:2px;}
.swing-track{height:7px;background:#0d1a0d;border-radius:4px;overflow:hidden;border:1px solid #1a2a1a;}
.swing-fill{height:100%;background:linear-gradient(90deg,#16a34a,#4ade80);border-radius:4px;width:0%;transition:none;}

/* WoW-style queue box */
.queue-box{display:none;align-items:center;gap:8px;padding:5px 8px;background:#080c18;border-radius:6px;margin-top:4px;border:1px solid #1a2040;}
.queue-box.on{display:flex;}
.queue-prompt{font-size:0.48rem;color:#2d3748;font-family:monospace;font-weight:900;text-transform:uppercase;flex-shrink:0;}
.queue-slot{flex:1;display:flex;align-items:center;gap:6px;padding:3px 8px;border-radius:4px;background:#0a0f20;border:1px solid #1e2a4a;min-height:26px;}
.queue-slot.filled{background:#0d1628;border-color:var(--warn);}
.queue-skill-icon{font-size:1.1rem;line-height:1;}
.queue-skill-name{font-size:0.66rem;font-weight:900;color:var(--warn);}
.queue-cancel{background:none;border:none;color:#3d4a5c;cursor:pointer;font-size:1rem;padding:0 8px;margin-left:auto;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;}
.queue-cancel:hover{color:var(--bad);}
.queue-empty{font-size:0.55rem;color:#2d3748;font-style:italic;}

/* FIGHT BAR */
.fight-bar{display:none;grid-template-columns:1fr auto auto;gap:5px;padding:6px 8px;}
.fight-bar.on{display:grid;}
.fight-btn{background:linear-gradient(135deg,#1d4ed8,#2563eb);border:2px solid #3b82f6;color:#fff;border-radius:10px;font-weight:900;font-size:0.85rem;cursor:pointer;padding:13px 0;transition:transform 0.1s,opacity 0.2s,box-shadow 0.2s;box-shadow:0 4px 18px rgba(59,130,246,0.25);}
.fight-btn:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(59,130,246,0.45);}
.fight-btn:disabled{opacity:0.45;cursor:not-allowed;background:linear-gradient(135deg,#1e293b,#334155);border-color:#475569;}
.switch-mid{background:var(--soft);border:1px solid var(--bord);color:#999;border-radius:8px;font-size:0.58rem;font-weight:900;cursor:pointer;padding:0 10px;white-space:nowrap;}

/* SKILL AREA */
.skill-area{display:none;padding:4px 6px 26px;}
.skill-area.on{display:block;}
.skill-row{display:grid;gap:4px;margin-bottom:3px;}

/* SKILL BUTTONS */
.btn{background:var(--soft);border:1.5px solid var(--bord);color:#fff;border-radius:8px;font-weight:900;cursor:pointer;transition:transform 0.07s,background 0.1s,box-shadow 0.1s;position:relative;padding:12px 2px;line-height:1;user-select:none;min-height:44px;}
.btn:active{transform:scale(0.91);}
.btn.cd{opacity:0.35;cursor:not-allowed;filter:saturate(0.2);}
.btn.no-en{opacity:0.38;border-style:dashed;}

.btn.queued{background:#1a1200!important;border-color:var(--warn)!important;box-shadow:0 0 0 2px var(--warn),0 0 14px rgba(245,158,11,0.5)!important;animation:queued-pulse 0.7s ease-in-out infinite;}
@keyframes queued-pulse{0%,100%{box-shadow:0 0 0 2px var(--warn),0 0 14px rgba(245,158,11,0.4);}50%{box-shadow:0 0 0 2px var(--warn),0 0 22px rgba(245,158,11,0.8);}}

.btn.off-gcd{border-color:#22c55e;background:#0a1a0a;}
.btn.off-gcd.int-ready{background:#052010;border-color:#4ade80;box-shadow:0 0 0 2px #22c55e,0 0 14px rgba(74,222,128,0.6);animation:int-pulse 0.4s ease-in-out infinite;}
@keyframes int-pulse{0%,100%{box-shadow:0 0 0 2px #22c55e,0 0 10px rgba(74,222,128,0.5);}50%{box-shadow:0 0 0 2px #22c55e,0 0 22px rgba(74,222,128,0.9);}}
.btn.off-gcd.int-cd{opacity:0.3;animation:none;border-style:dashed;}

.btn.active-sk{background:var(--sec);border-color:var(--sec);}
.btn.stance-agro{background:#7f1d1d;border-color:#ef4444;}
.btn.stance-def{background:#1e3a5f;border-color:#3b82f6;}
.kb{position:absolute;top:2px;right:3px;font-size:0.37rem;color:#444;font-family:monospace;}
.en-cost{position:absolute;bottom:2px;right:3px;font-size:0.37rem;color:var(--en);font-family:monospace;}
.cd-txt{font-size:0.38rem;color:#888;}
.btn-icon{font-size:0.9rem;display:block;line-height:1;}
.btn-lbl{font-size:0.40rem;display:block;margin-top:2px;}
.offgcd-badge{position:absolute;top:2px;left:3px;font-size:0.32rem;color:#22c55e;font-weight:900;font-family:monospace;}
.q-badge{position:absolute;top:-5px;right:-5px;background:var(--warn);color:#000;border-radius:50%;width:16px;height:16px;font-size:0.45rem;line-height:16px;text-align:center;font-weight:900;z-index:10;}

/* MODAL / OTHERS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:199;}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border-radius:14px;padding:16px;z-index:200;max-width:380px;width:94%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 0 40px rgba(0,0,0,0.8);animation:pop-in 0.2s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes pop-in{from{transform:translate(-50%,-50%) scale(0.82);opacity:0;}to{transform:translate(-50%,-50%) scale(1);opacity:1;}}
.modal h3{font-family:Cinzel;margin-bottom:10px;font-size:0.88rem;}
.save-slot{background:#0a0d13;border:1px solid var(--bord);border-radius:9px;padding:9px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.save-slot.active-slot{border-color:var(--prim);background:#0d1520;}
.save-slot-info{flex:1;min-width:0;}
.slot-btns{display:flex;gap:4px;}
.slot-btn{border:none;border-radius:5px;padding:5px 9px;font-size:0.60rem;font-weight:900;cursor:pointer;}
.train-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.train-card{background:#0a0d13;border:1px solid var(--bord);border-radius:9px;padding:8px;text-align:center;}
.train-card h4{font-size:0.62rem;margin-bottom:2px;color:var(--warn);}
.train-card .val{font-size:1.02rem;font-weight:900;margin-bottom:2px;}
.train-card .cost{font-size:0.52rem;color:#555;margin-bottom:4px;}
.train-card button{width:100%;padding:4px;background:var(--prim);border:none;border-radius:5px;color:#fff;font-weight:900;font-size:0.56rem;cursor:pointer;}
.train-card button:disabled{opacity:0.35;cursor:not-allowed;background:#222;}
.upgrade-card{background:#0a0d13;border:1px solid var(--bord);border-radius:9px;padding:7px;margin-bottom:5px;}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #0f0f0f;font-size:0.65rem;}
.stat-row:last-child{border-bottom:none;}
.stat-label{color:#555;}
.fight-history{max-height:160px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.fight-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0f0f0f;font-size:0.57rem;font-family:monospace;}
.fight-row.w{color:var(--good);}.fight-row.l{color:var(--bad);}
.ed-section{margin-bottom:12px;}
.ed-section h4{font-size:0.65rem;color:var(--warn);margin-bottom:7px;font-family:Cinzel;border-bottom:1px solid #111;padding-bottom:3px;}
.ed-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.ed-lbl{font-size:0.59rem;color:#888;}
.ed-ctrl{display:flex;align-items:center;gap:5px;}
.ed-range{width:70px;accent-color:var(--prim);}
.ed-input{background:#0a0d13;border:1px solid var(--bord);color:var(--txt);border-radius:4px;padding:2px 5px;font-size:0.62rem;font-weight:900;width:54px;text-align:right;}
.hero-card{background:var(--card);border-radius:10px;padding:13px;margin-bottom:9px;border:2px solid var(--bord);cursor:pointer;transition:border-color 0.2s,transform 0.1s;}
.hero-card:hover{border-color:var(--prim);transform:translateY(-2px);}
.hero-passive{font-size:0.55rem;color:#3d4a5c;margin:3px 0 7px;font-style:italic;line-height:1.4;}
.section-title{font-size:0.64rem;font-weight:900;color:var(--warn);margin:10px 0 7px;font-family:Cinzel;}
.info-box{font-size:0.57rem;color:#2d3748;margin-bottom:7px;font-family:monospace;padding:5px 7px;background:#080b10;border-radius:6px;line-height:1.5;}
.stance-badge{font-size:0.48rem;padding:1px 5px;border-radius:8px;font-weight:900;margin-left:3px;}
.stance-agro{background:#7f1d1d;color:#fca5a5;border:1px solid #ef4444;}
.stance-def{background:#1e3a5f;color:#93c5fd;border:1px solid #3b82f6;}
.hidden{display:none!important;}
</style>

</style>
</head>
<body>
<body>
<div class="app">
  <header>
    <button class="hdr-btn" onclick="G.openSaveMenu()">💾</button>
    <div class="res-grid">
      <div class="res-item">LV <span id="lv">1</span></div>
      <div class="res-item" style="color:var(--warn)">💰 <span id="gd">0</span></div>
      <div class="res-item" style="color:#f59e0b">🏆 <span id="tp">0</span></div>
      <div class="res-item" style="color:var(--good)">XP <span id="xp">0</span></div>
    </div>
    <button class="hdr-btn" id="char-badge" onclick="G.openSaveMenu()" style="color:var(--warn);font-size:0.60rem">P1</button>
    <button class="hdr-btn" onclick="G.openEditor()">⚙️</button>
    <button class="hdr-btn" onclick="G.openSessionMenu()" title="Save/Load/Demo">💿</button>
  </header>

  <div class="main-view" id="main-view">
    <div id="hero-pick"></div>
    <div id="game-ui" class="hidden">

      <div id="p-card" class="unit-card" style="border-left-color:var(--prim)">
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:0.73rem;font-weight:900">
          <span id="p-name">YOU</span>
          <span style="display:flex;align-items:center;gap:3px">
            <span id="stance-badge" class="stance-badge hidden"></span>
            <span id="p-s" style="font-size:0.58rem;color:var(--good)"></span>
          </span>
        </div>
        <div class="hp-box"><div id="p-f" class="hp-fill"></div><div id="p-t" class="hp-txt">0/0</div></div>
        <div class="en-box">
          <div id="en-f" class="en-fill"></div>
          <span id="en-regen-lbl" class="en-regen-lbl"></span>
        </div>
        <div class="status-row" id="p-status"></div>
      </div>

      <div id="e-card" class="unit-card hidden" style="border-left-color:var(--bad)">
        <div style="display:flex;justify-content:space-between;font-size:0.73rem;font-weight:900">
          <span id="e-n-disp">ENEMY</span><span id="e-s" style="font-size:0.58rem;color:var(--bad)"></span>
        </div>
        <div class="hp-box"><div id="e-f" class="hp-fill"></div><div id="e-t" class="hp-txt">0/0</div></div>
        <div class="status-row" id="e-status"></div>
        <div id="e-intent" class="intent-box hidden">
          <div class="intent-row"><span id="intent-lbl">—</span><span id="intent-cd" style="font-size:0.57rem;font-family:monospace;color:#555">—</span></div>
          <div class="intent-bar-bg"><div id="intent-fill" class="intent-bar-fill" style="width:100%"></div></div>
        </div>

class Arena {
  constructor(){

    this.rarity=[{n:'Common',c:'#94a3b8',m:1.0},{n:'Rare',c:'#3b82f6',m:1.5},{n:'Epic',c:'#a855f7',m:2.2},{n:'Legend',c:'#f59e0b',m:3.5}];

      {n:'Venom',atk:1.30,def:1.00,hp:1.10,color:'#84cc16'},
      {n:'Arcane',atk:1.20,def:1.30,hp:0.90,color:'#67e8f9'},
    ];
    // CRIT TRAINING NERF: max 15%, cost scaled up slightly.
    this.trainDefs=[
      {id:'atk', label:'⚔️ Attack',   perLv:4,  baseCost:1,costMult:1.22,maxLv:20},
      {id:'def', label:'🛡️ Defense',  perLv:3,  baseCost:1,costMult:1.22,maxLv:20},
      {id:'hp',  label:'❤️ Vitality', perLv:30, baseCost:1,costMult:1.18,maxLv:20},
      {id:'crit',label:'💥 Crit %',   perLv:1,  baseCost:2,costMult:1.35,maxLv:15},
      {id:'acc', label:'🎯 Accuracy', perLv:2,  baseCost:1,costMult:1.22,maxLv:13},
      {id:'eva', label:'💨 Evasion',  perLv:2,  baseCost:1,costMult:1.22,maxLv:20},
      {id:'res', label:'🔮 Resist',   perLv:2,  baseCost:1,costMult:1.25,maxLv:20},
    ];

    this.cfg=this._loadCfg();
    this.meta=this._loadMeta();
    this.activeSlot=this.meta.activeSlot||0;
    
    // Auto-migrate saves
    for(let i=0; i<NSLOTS; i++) {
        let oldSave = localStorage.getItem('nexus_v142_s'+i);
        if(oldSave && !localStorage.getItem(KEY+'_s'+i)) {
            localStorage.setItem(KEY+'_s'+i, oldSave);
        }
    }

    this.saves=Array.from({length:NSLOTS},(_,i)=>this._loadSlot(i));
    this.state=this.saves[this.activeSlot];
    this.sess=this._loadSess();

    this.stock=[];
    this.logData=[];
    this._lootPend=null;
    this._fightCooldown=0;
    
    this._ticker=null;
    this._lastTick=0;
    this._dotAccumulator=0;
    this._swingInterval=null;
    this._aiTimer=null;
    this._pDR = { count: 0, lastStun: 0 };
    this._eDR = { count: 0, lastStun: 0 };

    this.gcd={active:false,timer:null,queued:null};
    this.intCd=0;
    this.intWindowOpen=false;
    this._intResolve=null;
    this._intTimer=null;
    this._executing=false;

    this.pDps=[];this.eDps=[];this.fightStart=0;

    this._bindKeys();
    this.init();

  _loadMeta() {try{return JSON.parse(localStorage.getItem(KEY+'_meta')||'{}');}catch(e){return{};}}
  _saveMeta() {localStorage.setItem(KEY+'_meta',JSON.stringify({activeSlot:this.activeSlot}));}
  _loadSlot(i){try{const s=localStorage.getItem(KEY+'_s'+i);if(s)return JSON.parse(s);}catch(e){} return null;}
  _saveSlot(i,d){localStorage.setItem(KEY+'_s'+i,JSON.stringify(d));}
  _deleteSlot(i){localStorage.removeItem(KEY+'_s'+i);this.saves[i]=null;}
  _loadSess() {try{return JSON.parse(sessionStorage.getItem(SESS)||'{}');}catch(e){return{};}}
  _saveSess() {sessionStorage.setItem(SESS,JSON.stringify(this.sess));}
  _loadCfg()  {
    try{const s=JSON.parse(localStorage.getItem(CFG_KEY)||'{}');const o={...DEF_CFG};Object.keys(s).forEach(k=>{if(k in DEF_CFG)o[k]=s[k];});return o;}
    catch(e){return{...DEF_CFG};}
  }
  _saveCfg(){localStorage.setItem(CFG_KEY,JSON.stringify(this.cfg));}

  _newSave(){
    const CDS={h:0,s:0,b:0,fo:0,ra:0,po:0,mn:0,ex:0,bs:0,ev:0,sb:0,ta:0,gu:0,be:0,bl:0,ep:0,int:0};
    return{p:null,lv:1,xp:0,xn:200,gd:150,tp:0,inv:[],eq:{},cds:{...CDS},
      auto:false,wins:0,losses:0,fightsSinceShopRefresh:0,
      train:{atk:0,def:0,hp:0,crit:0,acc:0,eva:0,res:0},
      history:[],totalDmgDealt:0,totalDmgTaken:0,totalGoldEarned:0,
      pBuffs:[],energy:100,stance:'normal',interruptsHit:0,interruptsMissed:0,
      pSt:0, eSt:0};
  }

  save(){this._saveSlot(this.activeSlot,this.state);this._saveMeta();}
  reset(){if(confirm('Delete this character?')){this._deleteSlot(this.activeSlot);location.reload();}}

  init(){
    if(!this.state){this.state=this._newSave();this.saves[this.activeSlot]=this.state;}
    const st=this.state;

    // CRIT TRAINING SQUISH: Smoothly downscale legacy massive crit training to new 15 max cap
    if(st.p && !st.squished_crit_v143) {
        if(st.train.crit > 15) {
            st.train.crit = 15;
            this.log('⚙️ Applied V143 Crit Squish to Training.','info');
        }
        st.squished_crit_v143=true;
        this.save();
    }

    if(st.energy===undefined)st.energy=this.cfg.energyMax;
    if(st.stance===undefined)st.stance='normal';
    if(st.pSt===undefined)st.pSt=0;
    if(st.eSt===undefined)st.eSt=0;
    if(!st.cds.int)st.cds.int=0;
    if(!st.cds.ex)st.cds={...this._newSave().cds,...st.cds};
    if(st.fightsSinceShopRefresh===undefined)st.fightsSinceShopRefresh=0;
    
    if(st.combat){
      st.combat=false;st.enemy=null;st.pBuffs=[];
      st.pSt=0; st.eSt=0; st.pShield=st.pEvading=st.pImmune=false;
    }
    if(st.p){this.show();this._initShop();}
    else this.renderHeroPick();
    this._updateBadge();
    if(st.p) this._setCombatLayout(false);
  }

  show(){
    document.getElementById('hero-pick').classList.add('hidden');
    document.getElementById('game-ui').classList.remove('hidden');
    this._setCombatLayout(false);
    this.render();
  }

  _updateBadge(){const b=document.getElementById('char-badge');if(b)b.innerText='P'+(this.activeSlot+1);}

  _setCombatLayout(inCombat){
    const tabs=document.getElementById('main-tabs');
    const tc=document.getElementById('tab-content');
    const gcd=document.getElementById('gcd-area');
    const sw=document.getElementById('swing-wrap');
    const fb=document.getElementById('fight-bar');
    const sa=document.getElementById('skill-area');
    if(inCombat){
      tabs.classList.add('hidden');tc.classList.add('hidden');
      gcd.classList.add('on');if(sw)sw.classList.add('on');
      fb.classList.remove('on');sa.classList.add('on');
      document.getElementById('queue-box').classList.add('on');
    }else{
      tabs.classList.remove('hidden');tc.classList.remove('hidden');
      gcd.classList.remove('on');if(sw)sw.classList.remove('on');
      fb.classList.add('on');sa.classList.remove('on');
      document.getElementById('queue-box').classList.remove('on');
    }
  }

  _startTicker() {
    this._lastTick = performance.now();
    this._dotAccumulator = 0;
    
    if(this._ticker) clearInterval(this._ticker);
    
    this._ticker = setInterval(() => {
      if(!this.state.combat) {
        clearInterval(this._ticker);
        return;
      }
      
      const now = performance.now();
      const dt = now - this._lastTick;
      this._lastTick = now;
      
      this._tickCombat(dt);
    }, 100);
  }

  _tickCombat(dt) {
    const st = this.state;
    const dtSec = dt / 1000;

    this._tickStuns(dtSec);
    if(st.pSt > 0) return;

    const regenPerSec = this.cfg.energyRegen / 2.5; 
    st.energy = Math.min(this.cfg.energyMax, st.energy + (regenPerSec * dtSec));

    Object.keys(st.cds).forEach(k => {
      if(st.cds[k] > 0) st.cds[k] = Math.max(0, st.cds[k] - dtSec);
    });
    if(this.intCd > 0) this.intCd = Math.max(0, this.intCd - dtSec);

    this._tickBuffsRealTime('p', dtSec);
    this._tickBuffsRealTime('e', dtSec);

    this._dotAccumulator += dt;
    if(this._dotAccumulator >= 2000) {
      if(st.enemy) this.applyDoTs('p', st.enemy.atk);
      this.applyDoTs('e', this.getStats().atk);
      this.applyHoTs('p');
      this.applyHoTs('e');
      this._dotAccumulator -= 2000;
      
      if(st.p.chp <= 0) this.lose();
      else if(st.enemy && st.enemy.hp <= 0) this.win();
    }

    this.renderSkillBar();
    this._updateEnergyUI();
    this._updateDpsLive();
    this.renderCardsOnly();
  }

  _tickBuffsRealTime(target, dtSec) {
    const arr = target === 'p' ? this.state.pBuffs : this.state.enemy?.buffs;
    if(!arr) return;
    for(let i = arr.length - 1; i >= 0; i--) {
      arr[i].turns -= (dtSec / 2.5);
      if(arr[i].turns <= 0) {
        const d = BD[arr[i].id];
        if(d) this.log(`${target === 'p' ? '👤' : '👹'} ${d.icon}${d.name} expired`, 'info');
        arr.splice(i, 1);
      }
    }
  }

  _updateEnergyUI() {
    const enFill = document.getElementById('en-f');
    if(enFill) enFill.style.width = (this.state.energy / this.cfg.energyMax * 100) + '%';
    const regenPerSec = (this.cfg.energyRegen / 2.5).toFixed(1);
    const enLbl = document.getElementById('en-regen-lbl');
    if(enLbl) enLbl.innerText = `+${regenPerSec}/s`;
  }

  _applyStun(target, baseDurationSec) {
    const drState = target === 'p' ? this._pDR : this._eDR;
    const now = performance.now();
    
    if(now - drState.lastStun > 18000) drState.count = 0;
    
    let duration = baseDurationSec;
    if(drState.count === 1) duration *= 0.50;
    else if(drState.count === 2) duration *= 0.25;
    else if(drState.count >= 3) duration = 0; 

    if(duration > 0) {
      if(target === 'p') {
        this.state.pSt = duration;
        this.updateHud('p', `💤 STUNNED (${duration.toFixed(1)}s)`);
      } else {
        this.state.eSt = duration;
        this.updateHud('e', `💤 STUNNED (${duration.toFixed(1)}s)`);
      }
      drState.count++;
      drState.lastStun = now;
    } else {
      this.updateHud(target, '🛡️ IMMUNE (DR)');
    }
  }

  _tickStuns(dtSec) {
    if(this.state.pSt > 0) {
      this.state.pSt -= dtSec;
      if(this.state.pSt <= 0) { this.state.pSt = 0; this.state.pImmune = true; } 
    }
    if(this.state.eSt > 0) {
      this.state.eSt -= dtSec;
      if(this.state.eSt <= 0) this.state.eSt = 0;
    }
  }

  openSaveMenu(){
    if(this.state?.p)this.save();
    const inCombat=this.state?.combat;
    let body=`<div style="font-size:0.60rem;color:#555;margin-bottom:9px">${inCombat?'⚠️ Switching during combat counts as a loss.':'Auto-saved. Switch or create characters.'}</div>`;
    for(let i=0;i<NSLOTS;i++){
      const s=this.saves[i],isA=i===this.activeSlot,isEmpty=!s||!s.p;
      const sum=isEmpty?'<small style="color:#333">Empty slot</small>'
        :`<small style="color:#555">${s.p.n} · LV${s.lv} · ${s.wins}W/${s.losses}L · 🏆${s.tp}</small>`;
      body+=`<div class="save-slot${isA?' active-slot':''}">
        <div class="save-slot-info"><b style="color:${isA?'var(--warn)':'var(--txt)'}">Slot ${i+1}${isA?' ◀':''}</b>${sum}</div>
        <div class="slot-btns">
          ${isEmpty?`<button class="slot-btn" style="background:var(--prim);color:#fff" onclick="G.switchSlot(${i})">NEW</button>`
            :isA?`<button class="slot-btn" style="background:#111;color:#333" disabled>ACTIVE</button>`
            :`<button class="slot-btn" style="background:${inCombat?'var(--warn)':'var(--good)'};color:#000" onclick="G.switchSlot(${i})">${inCombat?'RESCUE':'LOAD'}</button>`}
          ${!isEmpty&&!isA?`<button class="slot-btn" style="background:var(--bad);color:#fff" onclick="G.deleteSlot(${i})">DEL</button>`:''}
        </div>
      </div>`;
    }
    this.showModal('💾 CHARACTERS',body,[{label:'CLOSE',cls:'',fn:()=>this.closeModal()}]);
  }

  switchSlot(i){
    const st=this.state;
    if(st.combat){
      st.losses++;st.history.push({result:'loss',eLvl:st.enemy?.lv||0,ePre:st.enemy?.pre||'?',gold:0,turns:0,dps:0});
      this._cleanupCombatTimers();
      st.combat=false;st.enemy=null;st.pBuffs=[];
      const s=this.getStats();st.p.chp=Math.floor(s.hp*0.08);
    }
    this._saveSlot(this.activeSlot,st);
    this.activeSlot=i;
    localStorage.setItem(KEY+'_meta',JSON.stringify({activeSlot:i}));
    location.reload();
  }

  deleteSlot(i){if(!confirm('Delete permanently?'))return;this._deleteSlot(i);this.openSaveMenu();}
